name = "wx-score-room"
main = "src/index.ts"
compatibility_date = "2023-05-18"

[vars]
WX_APPID = "wx4681bcb28c372453"


[[d1_databases]]
binding = "DB"
database_name = "wx_score_room_db"
database_id = "2858e78d-5e9a-40bd-8593-68ee660e7187"

[[r2_buckets]]
binding = "AVATARS"
bucket_name = "wx-score-room-bucket"

[durable_objects]
bindings = [
  { name = "ROOM_DO", class_name = "RoomDO" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomDO"]

[triggers]
crons = ["*/30 * * * *"]
